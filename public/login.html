<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="login.css">
  <title>Logg inn</title>
</head>
<body>
  <div class="innloggingsboks">
    <h1>Logg inn</h1>

    <p id="feilmelding" class="feilmelding"></p>

    <form id="loggInnSkjema">
      <input type="text" id="email" placeholder="email" required>
      <input type="password" id="passord" placeholder="Passord" required>
      <button type="submit">Logg inn</button>
    </form>

    <div class="testkontoer">
      <p><strong>Testkontoer:</strong></p>
      <button type="button" onclick="fyllAdministrator()">Administrator</button>
      <button type="button" onclick="fyllLærer()">Lærer</button>
      <button type="button" onclick="fyllITAnsatt()">IT-ansatt</button>
      <button type="button" onclick="fyllElev()">Elev</button>
      <button type="button" onclick="fyllMiljøarbeider()">Miljøarbeider</button>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
